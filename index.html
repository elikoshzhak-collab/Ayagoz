<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Аягоз ❤️</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  overflow-x:hidden;
  background: linear-gradient(135deg,#ff9ecf,#ffd6ec,#7ecbff,#7effc4,#fff07e);
  background-size: 1200% 1200%;
  animation: rainbow 15s ease infinite;
}

@keyframes rainbow{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

#passwordScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:#ffe6f0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#passwordScreen input{
  padding:12px;
  font-size:18px;
  border-radius:10px;
  border:2px solid #ff2e7a;
  margin-bottom:20px;
}

#passwordScreen button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ff2e7a;
  color:white;
  cursor:pointer;
}

.container{
  display:none;
  padding:20px;
}

h1{
  font-size:50px;
  color:#ff2e7a;
  text-shadow:0 0 10px #ff2e7a,0 0 25px #ff8ecf,0 0 35px #ffc0cb;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
  0%{text-shadow:0 0 5px #ff2e7a;}
  50%{text-shadow:0 0 25px #ff8ecf,0 0 35px #ffc0cb;}
  100%{text-shadow:0 0 5px #ff2e7a;}
}

.gallery{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}

.gallery img{
  width:220px;
  margin:10px;
  border-radius:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
  transition: transform 0.5s, box-shadow 0.5s;
}

.gallery img:hover{
  transform: scale(1.12);
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
}

button{
  margin-top:25px;
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:15px;
  background:#ff2e7a;
  color:white;
  cursor:pointer;
}

#surprise{
  display:none;
  font-size:32px;
  margin-top:20px;
  color:#ff2e7a;
  font-weight:bold;
  animation: pulse 1.5s infinite;
}

#letter{
  display:none;
  margin-top:20px;
  font-size:20px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.5;
  color:#333;
  background: rgba(255,255,255,0.8);
  padding:15px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

#love{
  margin-top:30px;
  font-size:50px;
  color:#ff2e7a;
  font-weight:bold;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.25);}
  100%{transform:scale(1);}
}

.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10px);}
  100%{transform:translateY(100vh);}
}
</style>
</head>
<body>

<div id="passwordScreen">
  <h2>Введите пароль</h2>
  <input type="password" id="passwordInput" placeholder="Пароль">
  <button onclick="checkPassword()">Войти</button>
  <p id="errorMsg" style="color:red;display:none;">Неверный пароль!</p>
</div>

<div class="container" id="content">

<h1>С 8 Марта, Мамочка 🌷</h1>

<p>
Ты самая лучшая мама на свете!<br>
Пусть твой день будет наполнен счастьем, радостью и улыбками ✨
</p>

<div class="gallery">
  <img src="ayagoz1.jpg">
  <img src="ayagoz2.jpg">
  <img src="ayagoz3.jpg">
  <img src="ayagoz4.jpg">
  <img src="ayagoz5.jpg">
</div>

<button onclick="showSurprise()">Нажми сюрприз 🎁</button>

<div id="surprise">
Ты невероятная ❤️
</div>

<button onclick="showLetter()">Открыть письмо 💌</button>

<div id="letter">
Дорогая мама,<br>
Спасибо за твою любовь, заботу и тепло!<br>
Желаю счастья, здоровья и радости каждый день ✨<br>
🌸💖✨❤️💎🎀🦋
</div>

<div id="love">
I ❤️ Mama
</div>

<audio autoplay loop>
  <source src="ayagoz-love.mp3" type="audio/mpeg">
</audio>

</div>

<script>
function checkPassword(){
  const password="лучшая мама"; // новый пароль
  const input=document.getElementById("passwordInput").value;
  if(input===password){
    document.getElementById("passwordScreen").style.display="none";
    document.getElementById("content").style.display="block";
  } else {
    document.getElementById("errorMsg").style.display="block";
  }
}

function showSurprise(){
  document.getElementById("surprise").style.display="block";
}

function showLetter(){
  document.getElementById("letter").style.display="block";
}

// Падающие эмодзи — дождь сердечек и милых символов
function createHeart(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  const emojis=["❤️","💖","✨","🌸","🦋","💎"];
  heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove();},8000);
}
setInterval(createHeart,300);
</script>

</body>
</html>
